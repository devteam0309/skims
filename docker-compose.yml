version: '3.9'

services:
  mongodb:
    image: mongo:7.0
    container_name: skims-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: skims
    volumes:
      - mongodb_data:/data/db
    networks:
      - skims-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: skims-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      MONGO_URI: mongodb://mongodb:27017/skims
      PORT: 5000
    env_file:
      - ./backend/.env
    depends_on:
      - mongodb
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs
    networks:
      - skims-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: skims-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - skims-network

volumes:
  mongodb_data:

networks:
  skims-network:
    driver: bridge
